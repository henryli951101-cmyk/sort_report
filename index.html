<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input, button {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>氣泡排序</h1>
    <p>輸入一組數字（以逗號分隔），點擊排序按鈕查看結果。</p>
    <input type="text" id="inputArray" placeholder="例如：64,34,25,12,22,11,90">
    <button onclick="performBubbleSort()">排序</button>
    <h2>結果</h2>
    <p id="output"></p>

    <script>
        function bubbleSort(arr) {
            let n = arr.length;
            for (let i = 0; i < n; i++) {
                let swapped = false;
                for (let j = 0; j < n - i - 1; j++) {
                    if (arr[j] > arr[j + 1]) {
                        // 交換元素
                        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
                        swapped = true;
                    }
                }
                // 若無交換，提早結束
                if (!swapped) break;
            }
            return arr;
        }

        function performBubbleSort() {
            const input = document.getElementById("inputArray").value;
            if (!input) {
                document.getElementById("output").innerText = "請輸入數字！";
                return;
            }

            // 將輸入轉換為數字陣列
            const array = input.split(",").map(num => parseFloat(num.trim()));
            if (array.some(isNaN)) {
                document.getElementById("output").innerText = "請確保所有輸入都是有效的數字！";
                return;
            }

            // 執行氣泡排序
            const sortedArray = bubbleSort(array);
            document.getElementById("output").innerText = `排序後的結果：${sortedArray.join(", ")}`;
        }
    </script>
</body>
</html>
